<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Your AI</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
</head>
<body>
<canvas id="ascii-rain" class="ascii-rain" aria-hidden="true"></canvas>

<div class="app">
    <div class="chat-container" id="output"></div>

    <form id="chat-form" class="input-bar">
        <div class="primary-controls">
            <textarea
                id="user-input"
                rows="1"
                placeholder="Ask anything... (use /help to see available commands)"
            ></textarea>

            <button type="submit">Send</button>
            <button type="button" id="stop-btn" disabled>Stop</button>
        </div>

        <div class="secondary-controls">
            <button type="button" id="theme-toggle" class="theme-btn" aria-label="Switch to cyberpunk theme">🛸 Cyberpunk</button>
            <input id="file-input" type="file" accept=".txt,.md,.csv,.json,.cpp,.cc,.cxx,.h,.hpp" />
            <button type="button" id="upload-btn">Upload</button>
        </div>
    </form>
</div>

<script>
const form = document.getElementById("chat-form");
const input = document.getElementById("user-input");
const output = document.getElementById("output");
const stopBtn = document.getElementById("stop-btn");
const themeToggle = document.getElementById("theme-toggle");
const fileInput = document.getElementById("file-input");
const uploadBtn = document.getElementById("upload-btn");
const asciiRainCanvas = document.getElementById("ascii-rain");

const rainCtx = asciiRainCanvas.getContext("2d");
const rainChars = "アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-<>";
const rainFontSize = 16;
let rainDrops = [];
let rainColumns = 0;
let rainInterval = null;

function setupRainCanvas() {
    asciiRainCanvas.width = window.innerWidth;
    asciiRainCanvas.height = window.innerHeight;
    rainColumns = Math.floor(asciiRainCanvas.width / rainFontSize);
    rainDrops = Array.from({ length: rainColumns }, () => Math.floor(Math.random() * -40));
}

function drawRainFrame() {
    if (!document.body.classList.contains("cyberpunk")) {
        return;
    }

    rainCtx.fillStyle = "rgba(3, 0, 10, 0.14)";
    rainCtx.fillRect(0, 0, asciiRainCanvas.width, asciiRainCanvas.height);

    rainCtx.fillStyle = "rgba(0, 234, 255, 0.78)";
    rainCtx.font = `${rainFontSize}px monospace`;

    for (let columnIndex = 0; columnIndex < rainDrops.length; columnIndex++) {
        const character = rainChars.charAt(Math.floor(Math.random() * rainChars.length));
        const x = columnIndex * rainFontSize;
        const y = rainDrops[columnIndex] * rainFontSize;

        rainCtx.fillText(character, x, y);

        if (y > asciiRainCanvas.height && Math.random() > 0.975) {
            rainDrops[columnIndex] = Math.floor(Math.random() * -20);
        }

        rainDrops[columnIndex] += 1;
    }
}

function stopRain() {
    if (rainInterval) {
        clearInterval(rainInterval);
        rainInterval = null;
    }
    rainCtx.clearRect(0, 0, asciiRainCanvas.width, asciiRainCanvas.height);
}

function startRain() {
    if (rainInterval) {
        return;
    }
    setupRainCanvas();
    rainInterval = setInterval(drawRainFrame, 40);
}

window.addEventListener("resize", () => {
    if (document.body.classList.contains("cyberpunk")) {
        setupRainCanvas();
    }
});

const SANITIZE_CONFIG = {
    FORBID_TAGS: ["script"],
};

DOMPurify.addHook("uponSanitizeAttribute", (node, data) => {
    if (data.attrName && data.attrName.toLowerCase().startsWith("on")) {
        data.keepAttr = false;
    }
});

const isDevHost = ["localhost", "127.0.0.1"].includes(window.location.hostname);
if (isDevHost) {
    const xssPayload = "<img src=x onerror=alert(1)>";
    const sanitizedCheck = DOMPurify.sanitize(marked.parse(xssPayload), SANITIZE_CONFIG);
    const isInert = !/on\w+=|<script/i.test(sanitizedCheck);
    console[isInert ? "info" : "error"](
        "[dev-xss-check]",
        isInert ? "Sanitization check passed." : "Sanitization check failed.",
        sanitizedCheck
    );
}

let currentStream = null;
let autoScroll = true;
const MAX_MESSAGES = 100;

/* ---------------- Scroll Lock ---------------- */

output.addEventListener("scroll", () => {
    const threshold = 50;
    autoScroll =
        output.scrollHeight - output.scrollTop - output.clientHeight < threshold;
});

function safeScroll() {
    if (autoScroll) {
        output.scrollTop = output.scrollHeight;
    }
}

/* ---------------- Auto Resize ---------------- */

input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
});

/* ---------------- Theme Toggle ---------------- */

function setTheme(themeName) {
    document.body.classList.remove("dark", "cyberpunk");

    if (themeName === "dark") {
        document.body.classList.add("dark");
    }

    if (themeName === "cyberpunk") {
        document.body.classList.add("cyberpunk");
        startRain();
    } else {
        stopRain();
    }

    const isCyberpunk = themeName === "cyberpunk";
    themeToggle.textContent = isCyberpunk ? "☀️ Default" : "🛸 Cyberpunk";
    themeToggle.setAttribute(
        "aria-label",
        isCyberpunk ? "Switch to default theme" : "Switch to cyberpunk theme"
    );

    localStorage.setItem("theme", themeName);
}

const savedTheme = localStorage.getItem("theme");
setTheme(savedTheme === "cyberpunk" ? "cyberpunk" : "default");

themeToggle.addEventListener("click", () => {
    const nextTheme = document.body.classList.contains("cyberpunk")
        ? "default"
        : "cyberpunk";
    setTheme(nextTheme);
});

/* ---------------- Stop Button ---------------- */

stopBtn.addEventListener("click", () => {
    if (currentStream) {
        currentStream.abort();
        currentStream = null;
    }
    stopBtn.disabled = true;
    input.disabled = false;
});

uploadBtn.addEventListener("click", async () => {
    const file = fileInput.files?.[0];
    if (!file) {
        appendMessage("Please select a file before uploading.", "assistant");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    uploadBtn.disabled = true;
    uploadBtn.textContent = "Uploading...";

    try {
        const response = await fetch("/upload", {
            method: "POST",
            body: formData,
        });

        const contentType = response.headers.get("content-type") || "";
        const isJson = contentType.includes("application/json");
        const payload = isJson ? await response.json() : null;
        if (!response.ok) {
            const fallbackError = isJson
                ? (payload?.error || "Upload failed.")
                : `Upload failed with status ${response.status}.`;
            throw new Error(fallbackError);
        }

        appendMessage(payload?.message || "Upload complete.", "assistant");
        fileInput.value = "";
    } catch (error) {
        appendMessage(`Upload error: ${error.message}`, "assistant");
    } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload";
    }
});

/* ---------------- Message Trim ---------------- */

function trimMessages() {
    while (output.children.length > MAX_MESSAGES) {
        output.removeChild(output.firstChild);
    }
}

/* ---------------- Append Message ---------------- */

function appendMessage(content, role) {
    const msg = document.createElement("div");
    msg.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    msg.appendChild(bubble);
    output.appendChild(msg);

    trimMessages();
    safeScroll();
}

/* ---------------- Form Submit ---------------- */

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const message = input.value.trim();
    if (!message) return;

    appendMessage(message, "user");

    input.value = "";
    input.style.height = "auto";

    streamResponse(message);
});

/* ---------------- Streaming ---------------- */

function streamResponse(message) {

    const msg = document.createElement("div");
    msg.className = "message assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    // Typing indicator
    bubble.innerHTML = `
        <span class="typing">
            <span></span><span></span><span></span>
        </span>
    `;

    msg.appendChild(bubble);
    output.appendChild(msg);

    trimMessages();
    safeScroll();

    input.disabled = true;
    stopBtn.disabled = false;

    const abortController = new AbortController();
    currentStream = abortController;

    let textNode = null;
    let cursorEl = null;
    let started = false;

    const resetUi = () => {
        input.disabled = false;
        input.focus();
        stopBtn.disabled = true;
        currentStream = null;
    };

    const handleEvent = (data) => {

        if (data.type === "token") {

            if (!started) {
                bubble.innerHTML = "";

                textNode = document.createTextNode("");
                bubble.appendChild(textNode);

                cursorEl = document.createElement("span");
                cursorEl.className = "cursor";
                bubble.appendChild(cursorEl);

                started = true;
            }

            textNode.nodeValue += data.content;
            safeScroll();
        }

        if (data.type === "done") {
            if (!started) {
                bubble.textContent = "";
                resetUi();
                return;
            }

            if (cursorEl) cursorEl.remove();

            // Render markdown once
            const parsedHtml = marked.parse(textNode.nodeValue);
            const sanitizedHtml = DOMPurify.sanitize(parsedHtml, SANITIZE_CONFIG);
            bubble.innerHTML = sanitizedHtml;

            input.disabled = false;
            input.focus();
            stopBtn.disabled = true;

            resetUi();
        }

        if (data.type === "error") {
            bubble.textContent = "Error: " + data.error;
            resetUi();
        }
    };

    fetch("/stream", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({ message }),
        signal: abortController.signal,
    })
        .then(async (response) => {
            if (!response.ok) {
                const message = await response.text();
                throw new Error(message || `Request failed with status ${response.status}`);
            }

            if (!response.body) {
                throw new Error("No response stream available.");
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split("\n\n");
                buffer = events.pop() || "";

                for (const rawEvent of events) {
                    const dataLines = rawEvent
                        .split("\n")
                        .filter((entry) => entry.startsWith("data:"));

                    if (!dataLines.length) continue;

                    try {
                        const payload = dataLines
                            .map((line) => line.slice(5).trim())
                            .join("\n");
                        const data = JSON.parse(payload);
                        handleEvent(data);
                    } catch {
                        handleEvent({
                            type: "error",
                            error: "Malformed server event.",
                        });
                    }
                }
            }

            if (currentStream === abortController) {
                resetUi();
            }
        })
        .catch((error) => {
            if (error.name === "AbortError") {
                bubble.textContent = "Request stopped.";
                resetUi();
                return;
            }

            handleEvent({
                type: "error",
                error: "Unable to stream response.",
            });
        });
}
</script>

</body>
</html>
