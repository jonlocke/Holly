<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Holly 6000</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon-holly.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script src="{{ url_for('static', filename='vendor/marked/marked.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/dompurify/purify.min.js') }}"></script>
</head>
<body>
<canvas id="ascii-rain" class="ascii-rain" aria-hidden="true"></canvas>

<div class="app">
    <div class="app-watermark" aria-hidden="true">Holly 6000</div>
    <div class="chat-shell">
        <aside class="avatar-column" aria-label="Holly avatar">
            <button id="avatar-theme-toggle" class="avatar-theme-toggle" type="button" aria-label="Toggle theme">
                <div id="holly-avatar" class="holly-avatar avatar-smiling" aria-hidden="true"></div>
            </button>
        </aside>
        <div class="chat-container" id="output"></div>
    </div>

    <form id="chat-form" class="input-bar">
        <div class="primary-controls">
            <div class="input-stack">
                <div id="input-prediction" class="input-prediction"></div>
                <textarea
                    id="user-input"
                    rows="1"
                    placeholder="Ask anything... use /help for a list of cmds"
                ></textarea>
            </div>

            <button type="submit">Send</button>
            <button type="button" id="stop-btn" disabled>Stop</button>
            <button type="button" id="upload-btn" class="control-btn">Upload file</button>
            <button type="button" id="mic-btn" class="control-btn" aria-pressed="false" title="Enable microphone">🎤</button>
        </div>

        <input id="file-input" type="file" accept=".txt,.md,.csv,.json,.cpp,.cc,.cxx,.h,.hpp" />
    </form>
</div>

<script>
const SCRIPT_ROOT = {{ request.script_root|tojson }};
const detectedBaseFromStatic = (() => {
    const styleHref = document.querySelector('link[rel="stylesheet"]')?.getAttribute('href') || "";
    const normalized = styleHref.startsWith("http") ? new URL(styleHref).pathname : styleHref;
    const marker = "/static/";
    const index = normalized.indexOf(marker);
    return index >= 0 ? normalized.slice(0, index) : "";
})();
const APP_BASE_PATH = SCRIPT_ROOT || detectedBaseFromStatic;
const appUrl = (path) => `${APP_BASE_PATH}${path}`;

const form = document.getElementById("chat-form");
const input = document.getElementById("user-input");
const output = document.getElementById("output");
const prediction = document.getElementById("input-prediction");
const stopBtn = document.getElementById("stop-btn");
const avatarThemeToggle = document.getElementById("avatar-theme-toggle");
const fileInput = document.getElementById("file-input");
const uploadBtn = document.getElementById("upload-btn");
const micBtn = document.getElementById("mic-btn");
const asciiRainCanvas = document.getElementById("ascii-rain");
const hollyAvatar = document.getElementById("holly-avatar");

const rainCtx = asciiRainCanvas.getContext("2d");
const rainChars = "アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-<>";
const rainFontSize = 16;
let rainDrops = [];
let rainColumns = 0;
let rainInterval = null;

function setupRainCanvas() {
    asciiRainCanvas.width = window.innerWidth;
    asciiRainCanvas.height = window.innerHeight;
    rainColumns = Math.floor(asciiRainCanvas.width / rainFontSize);
    rainDrops = Array.from({ length: rainColumns }, () => Math.floor(Math.random() * -40));
}

function drawRainFrame() {
    if (!document.body.classList.contains("cyberpunk")) {
        return;
    }

    rainCtx.fillStyle = "rgba(3, 0, 10, 0.14)";
    rainCtx.fillRect(0, 0, asciiRainCanvas.width, asciiRainCanvas.height);

    rainCtx.fillStyle = "rgba(0, 234, 255, 0.78)";
    rainCtx.font = `${rainFontSize}px monospace`;

    for (let columnIndex = 0; columnIndex < rainDrops.length; columnIndex++) {
        const character = rainChars.charAt(Math.floor(Math.random() * rainChars.length));
        const x = columnIndex * rainFontSize;
        const y = rainDrops[columnIndex] * rainFontSize;

        rainCtx.fillText(character, x, y);

        if (y > asciiRainCanvas.height && Math.random() > 0.975) {
            rainDrops[columnIndex] = Math.floor(Math.random() * -20);
        }

        rainDrops[columnIndex] += 1;
    }
}

function stopRain() {
    if (rainInterval) {
        clearInterval(rainInterval);
        rainInterval = null;
    }
    rainCtx.clearRect(0, 0, asciiRainCanvas.width, asciiRainCanvas.height);
}

function startRain() {
    if (rainInterval) {
        return;
    }
    setupRainCanvas();
    rainInterval = setInterval(drawRainFrame, 40);
}

window.addEventListener("resize", () => {
    if (document.body.classList.contains("cyberpunk")) {
        setupRainCanvas();
    }
});

const SANITIZE_CONFIG = {
    FORBID_TAGS: ["script"],
};

DOMPurify.addHook("uponSanitizeAttribute", (node, data) => {
    if (data.attrName && data.attrName.toLowerCase().startsWith("on")) {
        data.keepAttr = false;
    }
});

const isDevHost = ["localhost", "127.0.0.1"].includes(window.location.hostname);
if (isDevHost) {
    const xssPayload = "<img src=x onerror=alert(1)>";
    const sanitizedCheck = DOMPurify.sanitize(marked.parse(xssPayload), SANITIZE_CONFIG);
    const isInert = !/on\w+=|<script/i.test(sanitizedCheck);
    console[isInert ? "info" : "error"](
        "[dev-xss-check]",
        isInert ? "Sanitization check passed." : "Sanitization check failed.",
        sanitizedCheck
    );
}

let currentStream = null;
let autoScroll = true;
let questionHistory = [];
let historyCursor = -1;
const MAX_MESSAGES = 100;
let isStreaming = false;
let activeSpeechAudio = null;
let activeSpeechQueue = [];
let activeSpeechPlaybackToken = 0;
let micStream = null;
let micRecorder = null;
let micChunks = [];
let isMicRecording = false;
let micMimeType = "audio/wav";
let micAudioContext = null;
let micSourceNode = null;
let micProcessorNode = null;
let micPcmChunks = [];
let micSampleRate = 16000;
const FRONTEND_TTS_AUTOPLAY = {{ "true" if frontend_tts_autoplay else "false" }};
const ROUTES = {
    stream: appUrl("/stream"),
    upload: appUrl("/upload"),
    questionHistory: appUrl("/question-history"),
    sessionInfo: appUrl("/session-info"),
    textToSpeech: appUrl("/text-to-speech"),
    speechToText: appUrl("/speech-to-text"),
};
const PROCESSING_WORD_THRESHOLD = 7;
const speechCueCache = {
    processing: null,
    processingComplete: null,
};
let pendingProcessingPlaybackToken = null;

function countWords(text) {
    const safeText = (text || "").trim();
    if (!safeText) {
        return 0;
    }
    return safeText.split(/\s+/).length;
}

function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
}

function createAudioChunksCache(chunks) {
    return chunks.map((chunk) => new Uint8Array(chunk));
}

function setSpeakerState(button, state) {
    button.classList.remove("speaker-loading", "speaker-ready", "speaker-error");
    button.classList.add(`speaker-${state}`);
    button.disabled = state !== "ready";
    button.setAttribute("aria-busy", state === "loading" ? "true" : "false");

    if (state === "loading") {
        button.title = "Preparing audio...";
    } else if (state === "ready") {
        button.title = "Play cached audio";
    } else {
        button.title = "Audio unavailable";
    }
}

function queueAudioChunksForPlayback(chunks, playbackToken) {
    if (!chunks || !chunks.length) {
        return;
    }

    for (const chunk of chunks) {
        enqueueAudioChunkForPlayback(chunk, playbackToken);
    }
}

function playCachedAudio(chunks) {
    if (!chunks || !chunks.length) {
        return;
    }

    stopSpeechPlayback();
    queueAudioChunksForPlayback(chunks, activeSpeechPlaybackToken);
}

function createSpeakerButton() {
    const button = document.createElement("button");
    button.className = "speaker-indicator speaker-loading";
    button.type = "button";
    button.textContent = "🔊";
    button.setAttribute("aria-label", "Response audio");
    button.dataset.audioReady = "false";
    setSpeakerState(button, "loading");

    button.addEventListener("click", () => {
        const rawChunks = button.__audioChunks;
        if (!rawChunks || !rawChunks.length) {
            return;
        }
        playCachedAudio(rawChunks);
    });

    return button;
}

function stopSpeechPlayback() {
    activeSpeechPlaybackToken += 1;
    activeSpeechQueue = [];

    if (activeSpeechAudio) {
        activeSpeechAudio.pause();
        activeSpeechAudio.src = "";
        activeSpeechAudio = null;
    }

    if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
    }
}

function browserSpeak(text) {
    if (!("speechSynthesis" in window)) {
        return;
    }

    const safeText = (text || "").trim();
    if (!safeText) {
        return;
    }

    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(safeText);
    utterance.rate = 1;
    utterance.pitch = 1;
    window.speechSynthesis.speak(utterance);
}

function enqueueAudioChunkForPlayback(wavBytes, playbackToken) {
    if (!wavBytes || wavBytes.length === 0 || playbackToken !== activeSpeechPlaybackToken) {
        return;
    }

    activeSpeechQueue.push(wavBytes);

    const pumpQueue = async () => {
        if (playbackToken !== activeSpeechPlaybackToken || activeSpeechAudio || activeSpeechQueue.length === 0) {
            return;
        }

        const nextBytes = activeSpeechQueue.shift();
        const audioBlob = new Blob([nextBytes], { type: "audio/wav" });
        const objectUrl = URL.createObjectURL(audioBlob);
        const audio = new Audio(objectUrl);
        activeSpeechAudio = audio;

        const clearActiveAudio = () => {
            if (activeSpeechAudio === audio) {
                activeSpeechAudio = null;
            }
            URL.revokeObjectURL(objectUrl);
        };

        audio.onended = () => {
            clearActiveAudio();
            pumpQueue();
        };
        audio.onerror = () => {
            clearActiveAudio();
            pumpQueue();
        };

        try {
            await audio.play();
        } catch (error) {
            clearActiveAudio();
            pumpQueue();
        }
    };

    pumpQueue();
}

async function waitForSpeechQueueToDrain(playbackToken, timeoutMs = 15000) {
    const startedAt = Date.now();

    while (playbackToken === activeSpeechPlaybackToken) {
        if (!activeSpeechAudio && activeSpeechQueue.length === 0) {
            return;
        }

        if (Date.now() - startedAt > timeoutMs) {
            return;
        }

        await sleep(50);
    }
}

async function fetchTTSChunks(text) {
    const response = await fetch(`${ROUTES.textToSpeech}?stream=1`, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({ text }),
    });

    if (!response.ok) {
        throw new Error(`TTS request failed with status ${response.status}`);
    }

    const contentType = (response.headers.get("content-type") || "").toLowerCase();
    if (contentType.includes("application/json")) {
        const payload = await response.json();
        if (payload?.fallback === "browser_speak") {
            return null;
        }
        throw new Error(payload?.error || "Unexpected JSON response from streamed TTS endpoint.");
    }

    if (!response.body) {
        throw new Error("Streamed TTS response body is unavailable.");
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    const chunks = [];
    let buffer = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) {
            break;
        }

        buffer += decoder.decode(value, { stream: true });
        let newlineIndex = buffer.indexOf("\n");

        while (newlineIndex >= 0) {
            const line = buffer.slice(0, newlineIndex).trim();
            buffer = buffer.slice(newlineIndex + 1);

            if (line) {
                const msg = JSON.parse(line);
                if (msg.type === "audio_chunk" && msg.audio_b64_wav) {
                    const raw = atob(msg.audio_b64_wav);
                    const bytes = Uint8Array.from(raw, (char) => char.charCodeAt(0));
                    chunks.push(bytes);
                } else if (msg.type === "error") {
                    throw new Error(msg.detail || "Unknown streamed TTS error.");
                }
            }

            newlineIndex = buffer.indexOf("\n");
        }
    }

    return chunks.length ? createAudioChunksCache(chunks) : null;
}

async function warmProcessingSpeechCache() {
    try {
        const [processing, processingComplete] = await Promise.all([
            fetchTTSChunks("processing"),
            fetchTTSChunks("processing complete"),
        ]);

        speechCueCache.processing = processing;
        speechCueCache.processingComplete = processingComplete;
    } catch (error) {
        console.warn("Unable to pre-cache processing speech cues.", error);
    }
}

function queueProcessingCueForPrompt(message) {
    if (!FRONTEND_TTS_AUTOPLAY || countWords(message) <= PROCESSING_WORD_THRESHOLD) {
        pendingProcessingPlaybackToken = null;
        return;
    }

    stopSpeechPlayback();
    pendingProcessingPlaybackToken = activeSpeechPlaybackToken;

    if (speechCueCache.processing?.length) {
        queueAudioChunksForPlayback(speechCueCache.processing, pendingProcessingPlaybackToken);
    } else {
        browserSpeak("processing");
    }
}

async function playProcessingCompletePrelude(playbackToken) {
    if (playbackToken !== activeSpeechPlaybackToken) {
        return;
    }

    if (speechCueCache.processingComplete?.length) {
        queueAudioChunksForPlayback(speechCueCache.processingComplete, playbackToken);
        await waitForSpeechQueueToDrain(playbackToken);
    } else {
        browserSpeak("processing complete");
        await sleep(1200);
    }

    await sleep(2000);
}

async function cacheStreamedTTS(text, speakerButton, shouldAutoplay, useProcessingPrelude) {
    const response = await fetch(`${ROUTES.textToSpeech}?stream=1`, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({ text }),
    });

    const contentType = (response.headers.get("content-type") || "").toLowerCase();
    if (!response.ok) {
        throw new Error(`TTS request failed with status ${response.status}`);
    }

    if (contentType.includes("application/json")) {
        const payload = await response.json();
        if (payload?.fallback === "browser_speak") {
            pendingProcessingPlaybackToken = null;
            setSpeakerState(speakerButton, "error");
            if (shouldAutoplay) {
                browserSpeak(payload?.text || text);
            }
            return;
        }
        throw new Error(payload?.error || "Unexpected JSON response from streamed TTS endpoint.");
    }

    if (!response.body) {
        throw new Error("Streamed TTS response body is unavailable.");
    }

    let playbackToken = activeSpeechPlaybackToken;
    if (shouldAutoplay) {
        if (useProcessingPrelude && pendingProcessingPlaybackToken === activeSpeechPlaybackToken) {
            playbackToken = pendingProcessingPlaybackToken;
        } else {
            stopSpeechPlayback();
            playbackToken = activeSpeechPlaybackToken;
        }
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    const chunks = [];
    let handledFirstChunk = false;
    let buffer = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) {
            break;
        }

        if (shouldAutoplay && playbackToken !== activeSpeechPlaybackToken) {
            return;
        }

        buffer += decoder.decode(value, { stream: true });
        let newlineIndex = buffer.indexOf("\n");

        while (newlineIndex >= 0) {
            const line = buffer.slice(0, newlineIndex).trim();
            buffer = buffer.slice(newlineIndex + 1);

            if (line) {
                const msg = JSON.parse(line);
                if (msg.type === "audio_chunk" && msg.audio_b64_wav) {
                    const raw = atob(msg.audio_b64_wav);
                    const bytes = Uint8Array.from(raw, (char) => char.charCodeAt(0));
                    chunks.push(bytes);

                    if (shouldAutoplay) {
                        if (!handledFirstChunk && useProcessingPrelude) {
                            handledFirstChunk = true;
                            await playProcessingCompletePrelude(playbackToken);
                            if (playbackToken !== activeSpeechPlaybackToken) {
                                return;
                            }
                        }

                        enqueueAudioChunkForPlayback(bytes, playbackToken);
                    }
                } else if (msg.type === "error") {
                    throw new Error(msg.detail || "Unknown streamed TTS error.");
                }
            }

            newlineIndex = buffer.indexOf("\n");
        }
    }

    pendingProcessingPlaybackToken = null;

    if (!chunks.length) {
        throw new Error("No audio chunks were returned by the TTS stream.");
    }

    speakerButton.__audioChunks = createAudioChunksCache(chunks);
    speakerButton.dataset.audioReady = "true";
    setSpeakerState(speakerButton, "ready");
}

async function cacheAssistantAudio(text, speakerButton, useProcessingPrelude) {
    const safeText = (text || "").trim();
    if (!safeText) {
        setSpeakerState(speakerButton, "error");
        pendingProcessingPlaybackToken = null;
        return;
    }

    try {
        await cacheStreamedTTS(safeText, speakerButton, FRONTEND_TTS_AUTOPLAY, useProcessingPrelude);
    } catch (error) {
        console.warn("Unable to cache streamed TTS audio.", error);
        setSpeakerState(speakerButton, "error");
        pendingProcessingPlaybackToken = null;
        if (FRONTEND_TTS_AUTOPLAY) {
            browserSpeak(safeText);
        }
    }
}

function setAvatarState(state) {
    hollyAvatar.classList.remove("avatar-waiting", "avatar-thinking", "avatar-smiling");
    hollyAvatar.classList.add(`avatar-${state}`);
}

/* ---------------- Scroll Lock ---------------- */

output.addEventListener("scroll", () => {
    const threshold = 50;
    autoScroll =
        output.scrollHeight - output.scrollTop - output.clientHeight < threshold;
});

function safeScroll() {
    if (autoScroll) {
        output.scrollTop = output.scrollHeight;
    }
}

/* ---------------- Input Helpers ---------------- */

function updateInputHeight() {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
    prediction.style.height = input.style.height;
}

function escapeHtml(value) {
    return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function getPredictionSuffix(value) {
    const trimmed = value.trim();
    if (!trimmed) return "";

    const lowerTrimmed = trimmed.toLowerCase();
    for (let index = questionHistory.length - 1; index >= 0; index--) {
        const candidate = questionHistory[index];
        if (candidate.toLowerCase().startsWith(lowerTrimmed) && candidate.length > trimmed.length) {
            return candidate.slice(trimmed.length);
        }
    }

    return "";
}

function updatePrediction() {
    const typed = input.value;
    const suffix = getPredictionSuffix(typed);
    const typedHtml = `<span class="typed">${escapeHtml(typed)}</span>`;
    const suffixHtml = suffix ? `<span class="suffix">${escapeHtml(suffix)}</span>` : "";
    prediction.innerHTML = `${typedHtml}${suffixHtml}`;
    prediction.scrollTop = input.scrollTop;
}

function setInputValue(value) {
    input.value = value;
    updateInputHeight();
    updatePrediction();
}

function updateMicButtonUi() {
    micBtn.classList.toggle("mic-active", isMicRecording);
    micBtn.setAttribute("aria-pressed", isMicRecording ? "true" : "false");
    micBtn.title = isMicRecording ? "Disable microphone" : "Enable microphone";
}

function cleanupMicrophone() {
    if (micRecorder && micRecorder.state !== "inactive") {
        micRecorder.stop();
    }

    if (micProcessorNode) {
        micProcessorNode.disconnect();
    }

    if (micSourceNode) {
        micSourceNode.disconnect();
    }

    if (micAudioContext) {
        micAudioContext.close().catch(() => {});
    }

    if (micStream) {
        micStream.getTracks().forEach((track) => track.stop());
    }

    micRecorder = null;
    micStream = null;
    micChunks = [];
    micProcessorNode = null;
    micSourceNode = null;
    micAudioContext = null;
    micPcmChunks = [];
    isMicRecording = false;
    micBtn.disabled = false;
    updateMicButtonUi();
}

function downsampleBuffer(samples, sourceRate, targetRate) {
    if (targetRate >= sourceRate) {
        return samples;
    }

    const ratio = sourceRate / targetRate;
    const outLength = Math.floor(samples.length / ratio);
    const out = new Float32Array(outLength);
    let sourceIndex = 0;

    for (let i = 0; i < outLength; i++) {
        const nextSourceIndex = Math.round((i + 1) * ratio);
        let sum = 0;
        let count = 0;

        while (sourceIndex < nextSourceIndex && sourceIndex < samples.length) {
            sum += samples[sourceIndex];
            sourceIndex += 1;
            count += 1;
        }

        out[i] = count ? (sum / count) : 0;
    }

    return out;
}

function encodePcmToWav(samples, sampleRate) {
    const pcmData = new Int16Array(samples.length);
    for (let i = 0; i < samples.length; i++) {
        const s = Math.max(-1, Math.min(1, samples[i] || 0));
        pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }

    const wavBuffer = new ArrayBuffer(44 + pcmData.length * 2);
    const view = new DataView(wavBuffer);
    const writeString = (offset, value) => {
        for (let i = 0; i < value.length; i++) {
            view.setUint8(offset + i, value.charCodeAt(i));
        }
    };

    writeString(0, "RIFF");
    view.setUint32(4, 36 + pcmData.length * 2, true);
    writeString(8, "WAVE");
    writeString(12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(36, "data");
    view.setUint32(40, pcmData.length * 2, true);

    let offset = 44;
    for (let i = 0; i < pcmData.length; i++, offset += 2) {
        view.setInt16(offset, pcmData[i], true);
    }

    return new Blob([view], { type: "audio/wav" });
}

function buildWavBlobFromPcmChunks() {
    if (!micPcmChunks.length) {
        return null;
    }

    const totalLength = micPcmChunks.reduce((acc, chunk) => acc + chunk.length, 0);
    const merged = new Float32Array(totalLength);
    let offset = 0;
    for (const chunk of micPcmChunks) {
        merged.set(chunk, offset);
        offset += chunk.length;
    }

    const downsampled = downsampleBuffer(merged, micSampleRate, 16000);
    return encodePcmToWav(downsampled, 16000);
}

async function submitRecordedSpeech(speechBlob, filename = "speech.wav") {
    if (!speechBlob || !speechBlob.size) {
        return;
    }

    const formData = new FormData();
    formData.append("audio", speechBlob, filename);

    micBtn.disabled = true;
    const originalLabel = micBtn.textContent;
    micBtn.textContent = "…";

    try {
        const response = await fetch(ROUTES.speechToText, {
            method: "POST",
            credentials: "include",
            body: formData,
        });

        const payload = await response.json();
        if (!response.ok) {
            throw new Error(payload?.error || "Speech-to-text failed.");
        }

        const transcript = String(payload?.text || "").trim();
        if (!transcript) {
            return;
        }

        const existing = input.value.trim();
        const nextPrompt = existing ? `${existing} ${transcript}` : transcript;
        setInputValue(nextPrompt);
        input.focus();
    } catch (error) {
        console.error("Unable to transcribe microphone input", error);
        appendMessage(`Microphone error: ${error.message || "Unable to transcribe audio."}`, "assistant");
    } finally {
        micBtn.textContent = originalLabel;
        micBtn.disabled = false;
    }
}

async function startMicrophone() {
    if (!navigator.mediaDevices?.getUserMedia) {
        appendMessage("Microphone is not supported in this browser.", "assistant");
        return;
    }

    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micPcmChunks = [];
        micAudioContext = new (window.AudioContext || window.webkitAudioContext)();
        micSampleRate = micAudioContext.sampleRate;
        micSourceNode = micAudioContext.createMediaStreamSource(micStream);
        micProcessorNode = micAudioContext.createScriptProcessor(4096, 1, 1);

        micProcessorNode.onaudioprocess = (event) => {
            if (!isMicRecording) {
                return;
            }
            const channelData = event.inputBuffer.getChannelData(0);
            micPcmChunks.push(new Float32Array(channelData));
        };

        micSourceNode.connect(micProcessorNode);
        micProcessorNode.connect(micAudioContext.destination);

        isMicRecording = true;
        updateMicButtonUi();
    } catch (error) {
        cleanupMicrophone();
        appendMessage("Unable to access microphone. Please allow microphone permission.", "assistant");
    }
}

function stopMicrophone() {
    if (!isMicRecording) {
        cleanupMicrophone();
        return;
    }

    const wavBlob = buildWavBlobFromPcmChunks();
    cleanupMicrophone();
    submitRecordedSpeech(wavBlob, "speech.wav");
}

function moveHistory(direction) {
    if (!questionHistory.length) return;

    if (historyCursor === -1) {
        historyCursor = questionHistory.length;
    }

    historyCursor = Math.max(0, Math.min(questionHistory.length, historyCursor + direction));

    if (historyCursor === questionHistory.length) {
        setInputValue("");
        return;
    }

    setInputValue(questionHistory[historyCursor]);
}

async function loadQuestionHistory() {
    try {
        const response = await fetch(ROUTES.questionHistory, { credentials: "include" });
        if (!response.ok) return;

        const payload = await response.json();
        if (Array.isArray(payload.history)) {
            questionHistory = payload.history;
        }
    } catch (error) {
        console.warn("Unable to load question history", error);
    }
}

async function announceSessionModel() {
    try {
        const response = await fetch(ROUTES.sessionInfo, { credentials: "include" });
        if (!response.ok) {
            return;
        }

        const payload = await response.json();
        if (payload?.newSession && payload?.model) {
            appendMessage(`Session started. Model in use: ${payload.model}`, "assistant");
        }
    } catch (error) {
        console.warn("Unable to load session info", error);
    }
}

input.addEventListener("input", () => {
    historyCursor = -1;
    updateInputHeight();
    updatePrediction();
    if (!isStreaming && input.value.length) {
        setAvatarState("waiting");
        output.scrollTop = output.scrollHeight;
    }
});

input.addEventListener("scroll", () => {
    prediction.scrollTop = input.scrollTop;
});

input.addEventListener("keydown", (event) => {
    if (event.key === "Tab") {
        const suffix = getPredictionSuffix(input.value);
        if (!suffix) return;

        event.preventDefault();
        setInputValue(input.value + suffix);
        return;
    }

    if (event.key === "ArrowUp" && input.selectionStart === 0 && input.selectionEnd === 0) {
        event.preventDefault();
        moveHistory(-1);
        return;
    }

    if (event.key === "ArrowDown" && input.selectionStart === input.value.length && input.selectionEnd === input.value.length) {
        event.preventDefault();
        moveHistory(1);
        return;
    }

    if (event.key !== "Enter") {
        return;
    }

    if (!event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
    }
});

/* ---------------- Theme Toggle ---------------- */

function setTheme(themeName) {
    document.body.classList.remove("dark", "cyberpunk");

    if (themeName === "dark") {
        document.body.classList.add("dark");
    }

    if (themeName === "cyberpunk") {
        document.body.classList.add("cyberpunk");
        startRain();
    } else {
        stopRain();
    }

    localStorage.setItem("theme", themeName);
}

const savedTheme = localStorage.getItem("theme");
setTheme(savedTheme === "cyberpunk" ? "cyberpunk" : "default");

avatarThemeToggle.addEventListener("click", () => {
    const nextTheme = document.body.classList.contains("cyberpunk")
        ? "default"
        : "cyberpunk";
    setTheme(nextTheme);
});

/* ---------------- Stop Button ---------------- */

stopBtn.addEventListener("click", () => {
    if (currentStream) {
        currentStream.abort();
        currentStream = null;
    }
    stopSpeechPlayback();
    isStreaming = false;
    setAvatarState(input.value.length ? "waiting" : "smiling");
    stopBtn.disabled = true;
    input.disabled = false;
});

micBtn.addEventListener("click", () => {
    if (isMicRecording) {
        stopMicrophone();
        return;
    }

    startMicrophone();
});

async function uploadSelectedFile() {
    const file = fileInput.files?.[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);

    uploadBtn.disabled = true;
    uploadBtn.textContent = "Uploading...";

    try {
        const response = await fetch(ROUTES.upload, {
            method: "POST",
            credentials: "include",
            body: formData,
        });

        const contentType = response.headers.get("content-type") || "";
        const isJson = contentType.includes("application/json");
        const payload = isJson ? await response.json() : null;
        if (!response.ok) {
            const fallbackError = isJson
                ? (payload?.error || "Upload failed.")
                : `Upload failed with status ${response.status}.`;
            throw new Error(fallbackError);
        }

        appendMessage(payload?.message || "Upload complete.", "assistant");
        fileInput.value = "";
    } catch (error) {
        appendMessage(`Upload error: ${error.message}`, "assistant");
    } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload file";
    }
}

uploadBtn.addEventListener("click", () => {
    fileInput.click();
});

fileInput.addEventListener("change", () => {
    uploadSelectedFile();
});

/* ---------------- Message Trim ---------------- */

function trimMessages() {
    while (output.children.length > MAX_MESSAGES) {
        output.removeChild(output.firstChild);
    }
}

/* ---------------- Append Message ---------------- */

function appendMessage(content, role) {
    const msg = document.createElement("div");
    msg.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    msg.appendChild(bubble);
    output.appendChild(msg);

    trimMessages();
    safeScroll();
}

/* ---------------- Form Submit ---------------- */

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const message = input.value.trim();
    if (!message) return;

    appendMessage(message, "user");

    if (!questionHistory.length || questionHistory[questionHistory.length - 1] !== message) {
        questionHistory.push(message);
    }

    historyCursor = -1;
    setInputValue("");

    const useProcessingPrelude = countWords(message) > PROCESSING_WORD_THRESHOLD;
    queueProcessingCueForPrompt(message);
    streamResponse(message, useProcessingPrelude);
});

/* ---------------- Streaming ---------------- */

function streamResponse(message, useProcessingPrelude = false) {

    const msg = document.createElement("div");
    msg.className = "message assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    const speakerButton = createSpeakerButton();

    // Typing indicator
    bubble.innerHTML = `
        <span class="typing">
            <span></span><span></span><span></span>
        </span>
    `;

    msg.appendChild(bubble);
    output.appendChild(msg);

    trimMessages();
    safeScroll();

    input.disabled = true;
    stopBtn.disabled = false;
    isStreaming = true;
    setAvatarState("thinking");

    const abortController = new AbortController();
    currentStream = abortController;

    let textNode = null;
    let cursorEl = null;
    let started = false;

    const resetUi = () => {
        input.disabled = false;
        input.focus();
        stopBtn.disabled = true;
        currentStream = null;
        isStreaming = false;
    };

    const handleEvent = (data) => {

        if (data.type === "token") {

            if (!started) {
                bubble.innerHTML = "";

                textNode = document.createTextNode("");
                bubble.appendChild(textNode);

                cursorEl = document.createElement("span");
                cursorEl.className = "cursor";
                bubble.appendChild(cursorEl);

                started = true;
            }

            textNode.nodeValue += data.content;
            safeScroll();
        }

        if (data.type === "done") {
            if (!started) {
                bubble.textContent = "";
                setAvatarState("smiling");
                resetUi();
                return;
            }

            if (cursorEl) cursorEl.remove();

            const assistantText = textNode.nodeValue;

            // Render markdown once
            const parsedHtml = marked.parse(assistantText);
            const sanitizedHtml = DOMPurify.sanitize(parsedHtml, SANITIZE_CONFIG);
            bubble.innerHTML = sanitizedHtml;
            bubble.appendChild(speakerButton);

            input.disabled = false;
            input.focus();
            stopBtn.disabled = true;
            setAvatarState("smiling");

            cacheAssistantAudio(assistantText, speakerButton, useProcessingPrelude);
            resetUi();
        }

        if (data.type === "error") {
            bubble.textContent = "Error: " + data.error;
            setAvatarState(input.value.length ? "waiting" : "smiling");
            resetUi();
        }
    };

    fetch(ROUTES.stream, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({ message }),
        signal: abortController.signal,
    })
        .then(async (response) => {
            if (!response.ok) {
                const message = await response.text();
                throw new Error(message || `Request failed with status ${response.status}`);
            }

            if (!response.body) {
                throw new Error("No response stream available.");
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split("\n\n");
                buffer = events.pop() || "";

                for (const rawEvent of events) {
                    const dataLines = rawEvent
                        .split("\n")
                        .filter((entry) => entry.startsWith("data:"));

                    if (!dataLines.length) continue;

                    try {
                        const payload = dataLines
                            .map((line) => line.slice(5).trim())
                            .join("\n");
                        const data = JSON.parse(payload);
                        handleEvent(data);
                    } catch {
                        handleEvent({
                            type: "error",
                            error: "Malformed server event.",
                        });
                    }
                }
            }

            if (currentStream === abortController) {
                setAvatarState(input.value.length ? "waiting" : "smiling");
                resetUi();
            }
        })
        .catch((error) => {
            if (error.name === "AbortError") {
                bubble.textContent = "Request stopped.";
                setAvatarState(input.value.length ? "waiting" : "smiling");
                resetUi();
                return;
            }

            handleEvent({
                type: "error",
                error: "Unable to stream response.",
            });
        });
}

updateInputHeight();
updatePrediction();
loadQuestionHistory().then(updatePrediction);
announceSessionModel();
warmProcessingSpeechCache();
setAvatarState("smiling");
updateMicButtonUi();
</script>
