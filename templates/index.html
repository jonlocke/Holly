<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Your AI</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="app">
    <div class="chat-container" id="output"></div>

    <form id="chat-form" class="input-bar">
	<button id="theme-toggle" class="theme-btn">🌙</button>
        <textarea 
            id="user-input" 
            rows="1" 
            placeholder="Ask anything..."
        ></textarea>

        <button type="submit">Send</button>
        <button type="button" id="stop-btn" disabled>Stop</button>
    </form>
</div>

<script>
const form = document.getElementById("chat-form");
const input = document.getElementById("user-input");
const output = document.getElementById("output");
const stopBtn = document.getElementById("stop-btn");
const themeToggle = document.getElementById("theme-toggle");

let currentStream = null;
let autoScroll = true;
const MAX_MESSAGES = 100;

/* ---------------- Scroll Lock ---------------- */

output.addEventListener("scroll", () => {
    const threshold = 50;
    autoScroll =
        output.scrollHeight - output.scrollTop - output.clientHeight < threshold;
});

function safeScroll() {
    if (autoScroll) {
        output.scrollTop = output.scrollHeight;
    }
}

/* ---------------- Auto Resize ---------------- */

input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
});

/* ---------------- Theme Toggle ---------------- */

themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
});

/* ---------------- Stop Button ---------------- */

stopBtn.addEventListener("click", () => {
    if (currentStream) {
        currentStream.abort();
        currentStream = null;
    }
    stopBtn.disabled = true;
    input.disabled = false;
});

/* ---------------- Message Trim ---------------- */

function trimMessages() {
    while (output.children.length > MAX_MESSAGES) {
        output.removeChild(output.firstChild);
    }
}

/* ---------------- Append Message ---------------- */

function appendMessage(content, role) {
    const msg = document.createElement("div");
    msg.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    msg.appendChild(bubble);
    output.appendChild(msg);

    trimMessages();
    safeScroll();
}

/* ---------------- Form Submit ---------------- */

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const message = input.value.trim();
    if (!message) return;

    appendMessage(message, "user");

    input.value = "";
    input.style.height = "auto";

    streamResponse(message);
});

/* ---------------- Streaming ---------------- */

function streamResponse(message) {

    const msg = document.createElement("div");
    msg.className = "message assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    // Typing indicator
    bubble.innerHTML = `
        <span class="typing">
            <span></span><span></span><span></span>
        </span>
    `;

    msg.appendChild(bubble);
    output.appendChild(msg);

    trimMessages();
    safeScroll();

    input.disabled = true;
    stopBtn.disabled = false;

    const abortController = new AbortController();
    currentStream = abortController;

    let textNode = null;
    let cursorEl = null;
    let started = false;

    const resetUi = () => {
        input.disabled = false;
        input.focus();
        stopBtn.disabled = true;
        currentStream = null;
    };

    const handleEvent = (data) => {

        if (data.type === "token") {

            if (!started) {
                bubble.innerHTML = "";

                textNode = document.createTextNode("");
                bubble.appendChild(textNode);

                cursorEl = document.createElement("span");
                cursorEl.className = "cursor";
                bubble.appendChild(cursorEl);

                started = true;
            }

            textNode.nodeValue += data.content;
            safeScroll();
        }

        if (data.type === "done") {

            if (cursorEl) cursorEl.remove();

            // Render markdown once
            const renderedText = textNode ? textNode.nodeValue : "";
            bubble.innerHTML = marked.parse(renderedText);
            resetUi();
        }

        if (data.type === "error") {
            bubble.textContent = "Error: " + data.error;
            resetUi();
        }
    };

    fetch("/stream", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({ message }),
        signal: abortController.signal,
    })
        .then(async (response) => {
            if (!response.body) {
                throw new Error("No response stream available.");
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split("\n\n");
                buffer = events.pop() || "";

                for (const rawEvent of events) {
                    const line = rawEvent
                        .split("\n")
                        .find((entry) => entry.startsWith("data:"));

                    if (!line) continue;

                    try {
                        const data = JSON.parse(line.slice(5).trim());
                        handleEvent(data);
                    } catch {
                        handleEvent({
                            type: "error",
                            error: "Malformed server event.",
                        });
                    }
                }
            }

            if (currentStream === abortController) {
                resetUi();
            }
        })
        .catch((error) => {
            if (error.name === "AbortError") {
                bubble.textContent = "Request stopped.";
                resetUi();
                return;
            }

            handleEvent({
                type: "error",
                error: "Unable to stream response.",
            });
        });
}
</script>

</body>
</html>
