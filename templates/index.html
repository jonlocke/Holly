<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Holly 6000</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon-holly.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='20260401-thinking-scale-4') }}" />

<body>
<canvas id="ascii-rain" class="ascii-rain" aria-hidden="true"></canvas>

<div class="app">
    <div class="app-watermark" aria-hidden="true">Holly 6000</div>
    <div class="chat-shell">
        <aside class="avatar-column" aria-label="Holly avatar">
            <button id="avatar-theme-toggle" class="avatar-theme-toggle" type="button" aria-label="Toggle theme">
                <div id="holly-avatar" class="holly-avatar avatar-smiling" aria-hidden="true"></div>
            </button>
        </aside>
        <div class="chat-container" id="output"></div>
    </div>

    <form id="chat-form" class="input-bar">
        <div class="input-stack">
            <div id="input-prediction" class="input-prediction"></div>
            <textarea
                id="user-input"
                rows="1"
                placeholder="Ask anything... use /help for a list of cmds"
            ></textarea>
        </div>
        <div class="primary-controls">
            <button
                type="button"
                id="mobile-actions-toggle"
                class="control-btn mobile-actions-toggle"
                aria-expanded="false"
                aria-controls="mobile-actions-panel"
            >
                Actions
            </button>
            <div id="mobile-actions-panel" class="mobile-actions-panel">
                <button type="submit" id="send-btn">Send</button>
                <button type="button" id="stop-btn" disabled>Stop</button>
                <button type="button" id="upload-btn" class="control-btn">Upload file</button>
                <button type="button" id="face-verify-btn" class="control-btn">Verify Face</button>
                <button type="button" id="account-btn" class="control-btn">Account</button>
                <button type="button" id="logout-btn" class="control-btn">Logout</button>
            </div>
            <button type="button" id="mic-btn" class="control-btn" aria-pressed="false" title="Enable microphone">🎤</button>
        </div>
        <div id="mic-status" class="mic-status" aria-live="polite"></div>
        <div id="face-status" class="mic-status" aria-live="polite"></div>

        <input id="file-input" type="file" accept=".txt,.md,.csv,.json,.cpp,.cc,.cxx,.h,.hpp" />
    </form>
</div>

<div id="auth-gate" class="auth-gate">
    <div class="auth-gate-card">
        <h1>Sign In</h1>
        <p class="auth-gate-copy">Use your password or verify your pre-enrolled face to unlock Holly.</p>
        <div class="auth-gate-actions">
            <input id="login-username-input" class="auth-input" type="text" placeholder="username" autocomplete="username" />
            <input id="login-password-input" class="auth-input" type="password" placeholder="password" autocomplete="current-password" />
            <button type="button" id="login-password-btn" class="control-btn">Sign In With Password</button>
            <button type="button" id="login-face-btn" class="control-btn">Verify Face To Sign In</button>
            <button type="button" id="open-admin-btn" class="control-btn">Admin</button>
        </div>
        <div id="auth-gate-status" class="auth-gate-status" aria-live="polite"></div>
    </div>
</div>

<div id="admin-modal" class="face-modal" hidden>
    <div class="face-modal-card admin-modal-card" role="dialog" aria-modal="true" aria-labelledby="admin-modal-title">
        <div class="face-modal-header">
            <h2 id="admin-modal-title">Admin Console</h2>
            <button type="button" id="admin-close-btn" class="control-btn">Close</button>
        </div>
        <div id="admin-auth-row" class="admin-auth-row">
            <input id="admin-username-input" class="auth-input" type="text" placeholder="admin username" autocomplete="username" />
            <input id="admin-password-input" class="auth-input" type="password" placeholder="admin password" autocomplete="current-password" />
            <button type="button" id="admin-login-btn" class="control-btn">Admin Login</button>
            <button type="button" id="admin-logout-btn" class="control-btn" hidden>Admin Logout</button>
        </div>
        <div id="admin-create-row" class="admin-create-row" hidden>
            <input id="admin-create-username" class="auth-input auth-input-compact" type="text" placeholder="new username" />
            <input id="admin-create-display-name" class="auth-input auth-input-compact" type="text" placeholder="display name" />
            <input id="admin-create-password" class="auth-input auth-input-compact" type="password" placeholder="initial password (optional)" />

    </div>
</div>

<div id="account-modal" class="face-modal" hidden>
    <div class="face-modal-card admin-modal-card" role="dialog" aria-modal="true" aria-labelledby="account-modal-title">
        <div class="face-modal-header">
            <h2 id="account-modal-title">My Account</h2>
            <button type="button" id="account-close-btn" class="control-btn">Close</button>
        </div>
        <div class="admin-create-row">

            <input id="account-new-password" class="auth-input auth-input-compact" type="password" placeholder="new password" autocomplete="new-password" />

        </div>

const rainCtx = asciiRainCanvas.getContext("2d");
const rainChars = "アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-<>";
const rainFontSize = 16;
let rainDrops = [];
let rainColumns = 0;
let rainInterval = null;

function setupRainCanvas() {
    asciiRainCanvas.width = window.innerWidth;
    asciiRainCanvas.height = window.innerHeight;
    rainColumns = Math.floor(asciiRainCanvas.width / rainFontSize);
    rainDrops = Array.from({ length: rainColumns }, () => Math.floor(Math.random() * -40));
}

function drawRainFrame() {
    if (!document.body.classList.contains("cyberpunk")) {
        return;
    }

    rainCtx.fillStyle = "rgba(3, 0, 10, 0.14)";
    rainCtx.fillRect(0, 0, asciiRainCanvas.width, asciiRainCanvas.height);

    rainCtx.fillStyle = "rgba(0, 234, 255, 0.78)";
    rainCtx.font = `${rainFontSize}px monospace`;

    for (let columnIndex = 0; columnIndex < rainDrops.length; columnIndex++) {
        const character = rainChars.charAt(Math.floor(Math.random() * rainChars.length));
        const x = columnIndex * rainFontSize;
        const y = rainDrops[columnIndex] * rainFontSize;

        rainCtx.fillText(character, x, y);

        if (y > asciiRainCanvas.height && Math.random() > 0.975) {
            rainDrops[columnIndex] = Math.floor(Math.random() * -20);
        }

        rainDrops[columnIndex] += 1;
    }
}

function stopRain() {
    if (rainInterval) {
        clearInterval(rainInterval);
        rainInterval = null;
    }
    rainCtx.clearRect(0, 0, asciiRainCanvas.width, asciiRainCanvas.height);
}

function startRain() {
    if (rainInterval) {
        return;
    }
    setupRainCanvas();
    rainInterval = setInterval(drawRainFrame, 40);
}

window.addEventListener("resize", () => {
    if (document.body.classList.contains("cyberpunk")) {
        setupRainCanvas();
    }
});

const SANITIZE_CONFIG = {
    FORBID_TAGS: ["script"],
};

DOMPurify.addHook("uponSanitizeAttribute", (node, data) => {
    if (data.attrName && data.attrName.toLowerCase().startsWith("on")) {
        data.keepAttr = false;
    }
});

const isDevHost = ["localhost", "127.0.0.1"].includes(window.location.hostname);
if (isDevHost) {
    const xssPayload = "<img src=x onerror=alert(1)>";
    const sanitizedCheck = DOMPurify.sanitize(marked.parse(xssPayload), SANITIZE_CONFIG);
    const isInert = !/on\w+=|<script/i.test(sanitizedCheck);
    console[isInert ? "info" : "error"](
        "[dev-xss-check]",
        isInert ? "Sanitization check passed." : "Sanitization check failed.",
        sanitizedCheck
    );
}

function shouldUseCollapsedMobileActions() {
    return window.matchMedia("(max-width: 480px)").matches;
}

    mobileActionsPanel.classList.toggle("is-open", open);
    mobileActionsToggle.setAttribute("aria-expanded", open ? "true" : "false");
    mobileActionsToggle.textContent = open ? "Hide Actions" : "Actions";
}

async function unlockAudioPlayback() {
    if (audioPlaybackUnlocked && speechAudioContext && speechAudioContext.state === "running") {
        return true;
    }

    if (audioUnlockPromise) {
        return audioUnlockPromise;
    }

    audioUnlockPromise = (async () => {
        try {
            const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextCtor) {
                return false;
            }

            if (!speechAudioContext || speechAudioContext.state === "closed") {
                speechAudioContext = new AudioContextCtor();
            }

            if (speechAudioContext.state !== "running") {
                await speechAudioContext.resume();
            }

            const buffer = speechAudioContext.createBuffer(1, 1, 22050);
            const source = speechAudioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(speechAudioContext.destination);
            source.start(0);
            source.stop(0);

            audioPlaybackUnlocked = speechAudioContext.state === "running";
            return audioPlaybackUnlocked;
        } catch (error) {
            return false;
        } finally {
            audioUnlockPromise = null;
        }
    })();

    return audioUnlockPromise;
}

function countWords(text) {
    const safeText = (text || "").trim();
    if (!safeText) {
        return 0;
    }
    return safeText.split(/\s+/).length;
}

function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
}

function setFaceStatus(message) {
    footerStatusNote = message || "";
    refreshFooterStatus();
}

function refreshFooterStatus() {
    const parts = [];
    if (authState?.authenticated && authState?.user?.display_name) {
        parts.push(
            `Signed in as ${authState.user.display_name}. Step-up is ${authState.stepUpActive ? "active" : "inactive"}.`

    } else {
        parts.push("Sign in with a pre-enrolled face to start chatting.");
    }

    if (currentModelLabel) {
        parts.push(`Model: ${currentModelLabel}`);
    }

    if (footerStatusNote) {
        parts.push(footerStatusNote);
    }

    faceStatus.textContent = parts.join(" --- ");
}

function renderAdminUsers(users) {
    if (!Array.isArray(users) || !users.length) {
        adminUsersList.innerHTML = "<p class=\"auth-gate-copy\">No users yet.</p>";
        return;
    }
    adminUsersList.innerHTML = users
        .map(

                        <strong>${user.display_name}</strong>
                        <span>@${user.username}</span>
                        <span>${user.role}</span>
                        <span>${user.has_password ? "password set" : "no password"}</span>
                    </div>
                    <div class="admin-user-actions">
                        <input
                            type="password"
                            class="auth-input auth-input-compact admin-password-input"
                            data-username="${user.username}"
                            placeholder="new password"
                        />
                        <button
                            type="button"
                            class="control-btn admin-password-reset-btn"
                            data-username="${user.username}"
                        >
                            Reset Password
                        </button>
                        <button
                            type="button"
                            class="control-btn admin-reenroll-btn"
                            data-username="${user.username}"
                        >
                            Re-enroll Face
                        </button>
                    </div>

            `
        )
        .join("");
}

function renderAuthState(nextAuthState) {
    authState = nextAuthState;
    const authenticated = Boolean(authState?.authenticated);
    const adminAuthenticated = Boolean(authState?.adminAuthenticated);
    if (!authenticated) {
        closeAccountModal();
    }
    authGate.hidden = authenticated;
    input.disabled = !authenticated || isStreaming;
    faceVerifyBtn.hidden = !authenticated;
    accountBtn.hidden = !authenticated;
    logoutBtn.hidden = !authenticated;
    adminAuthRow.hidden = adminAuthenticated;
    adminCreateRow.hidden = !adminAuthenticated;
    adminUsersList.hidden = !adminAuthenticated;
    adminLogoutBtn.hidden = !adminAuthenticated;
    faceVerifyBtn.textContent = "Step-Up Face";
    refreshFooterStatus();
}

async function refreshAuthState() {
    const response = await fetch(ROUTES.authStatus, { credentials: "include" });
    const payload = await response.json();
    renderAuthState(payload);
    return payload;
}

async function ensureAuthenticatedSession() {
    const current = await refreshAuthState();
    if (!current?.authenticated) {
        setAuthGateStatus("Your session expired. Sign in again to continue.");
        if (currentStream) {
            currentStream.abort();
            currentStream = null;
        }
        return false;
    }
    return true;
}

async function loadAdminUsers() {
    const response = await fetch(ROUTES.adminUsers, { credentials: "include" });
    const payload = await response.json();
    if (!response.ok) {
        throw new Error(payload?.error || "Unable to load users.");
    }
    renderAdminUsers(payload.users);
}

async function openAdminModal() {
    try {
        await refreshAuthState();
        if (authState?.adminAuthenticated) {
            await loadAdminUsers();
        }
    } catch (error) {
        console.warn("Unable to refresh admin auth state", error);
    }
    adminModal.hidden = false;
    document.body.classList.add("face-modal-open");
    setAdminStatus("");
}

function closeAdminModal() {
    adminModal.hidden = true;
    if (faceModal.hidden && accountModal.hidden) {
        document.body.classList.remove("face-modal-open");
    }
}

function openAccountModal() {
    if (!authState?.authenticated) {
        setAuthGateStatus("Sign in first.");
        return;
    }
    accountModal.hidden = false;
    document.body.classList.add("face-modal-open");
    accountCurrentPassword.value = "";
    accountNewPassword.value = "";
    setAccountStatus("");
}

function closeAccountModal() {
    accountModal.hidden = true;
    if (faceModal.hidden && adminModal.hidden) {
        document.body.classList.remove("face-modal-open");
    }
}

function stopFaceCamera() {
    if (faceStream) {
        for (const track of faceStream.getTracks()) {
            track.stop();
        }
        faceStream = null;
    }
    faceVideo.srcObject = null;
}

function closeFaceModal() {
    faceModal.hidden = true;
    if (adminModal.hidden && accountModal.hidden) {
        document.body.classList.remove("face-modal-open");
    }
    faceCapturePending = false;
    faceCaptureBtn.disabled = false;
    faceCaptureBtn.textContent = "Capture";
    setFaceModalStatus("");
    stopFaceCamera();
}

async function openFaceModal(mode) {
    if (!navigator.mediaDevices?.getUserMedia) {
        appendMessage("Camera capture is not supported in this browser.", "assistant");
        return;
    }

    faceCaptureMode = mode;
    faceModal.hidden = false;
    document.body.classList.add("face-modal-open");
    if (mode === "login") {
        faceModalCopy.textContent = `Verify the pre-enrolled face for ${faceCaptureUsername} to unlock the session.`;
        faceCaptureBtn.textContent = "Capture To Sign In";
    } else if (mode === "self-enroll") {
        faceModalCopy.textContent = "Capture a fresh face frame to replace your enrolled face.";
        faceCaptureBtn.textContent = "Capture For Re-enroll";
    } else if (mode === "admin-enroll") {
        faceModalCopy.textContent = `Capture a face frame to enroll ${faceCaptureUsername}.`;
        faceCaptureBtn.textContent = "Capture For Enroll";
    } else if (mode === "step_up") {
        faceModalCopy.textContent = "Capture a fresh live face frame to unlock sensitive commands.";
        faceCaptureBtn.textContent = "Capture For Step-Up";
    } else {
        faceModalCopy.textContent = mode === "enroll"
            ? "Align your face in the frame, then capture to enroll this browser session."
            : "Align your face in the frame, then capture to refresh face verification for this session.";
        faceCaptureBtn.textContent = mode === "enroll" ? "Capture For Enroll" : "Capture For Verify";
    }
    setFaceModalStatus("Requesting camera permission…");

    try {
        faceStream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "user",
                width: { ideal: 640 },
                height: { ideal: 640 },
            },
            audio: false,
        });
        faceVideo.srcObject = faceStream;
        await faceVideo.play();
        setFaceModalStatus("Camera ready. Hold still and capture.");
    } catch (error) {
        closeFaceModal();
        appendMessage("Unable to access the camera. Please allow webcam permission and try again.", "assistant");
    }
}

function buildFaceSignatureFromVideo() {
    const context = faceCanvas.getContext("2d", { willReadFrequently: true });
    const videoWidth = faceVideo.videoWidth || 0;
    const videoHeight = faceVideo.videoHeight || 0;
    if (!videoWidth || !videoHeight) {
        throw new Error("Camera frame is not ready yet.");
    }

    const side = Math.min(videoWidth, videoHeight);
    const sourceX = Math.floor((videoWidth - side) / 2);
    const sourceY = Math.floor((videoHeight - side) / 2);
    context.drawImage(faceVideo, sourceX, sourceY, side, side, 0, 0, faceCanvas.width, faceCanvas.height);

    const imageData = context.getImageData(0, 0, faceCanvas.width, faceCanvas.height).data;
    const signature = [];
    for (let index = 0; index < imageData.length; index += 4) {
        const red = imageData[index];
        const green = imageData[index + 1];
        const blue = imageData[index + 2];
        const luminance = Math.round(0.2126 * red + 0.7152 * green + 0.0722 * blue);
        signature.push(luminance);
    }
    return signature;
}

async function submitFaceCapture() {
    if (faceCapturePending) {
        return;
    }

    faceCapturePending = true;
    faceCaptureBtn.disabled = true;
    setFaceModalStatus(faceCaptureMode === "enroll" ? "Capturing enrollment frame…" : "Capturing verification frame…");

    try {
        const signature = buildFaceSignatureFromVideo();
        const response = await fetch(ROUTES.faceCapture, {
            method: "POST",
            credentials: "include",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                action: faceCaptureMode === "admin-enroll" || faceCaptureMode === "self-enroll" ? "enroll" : "verify",
                mode: faceCaptureMode,
                liveness: "pass",
                username: faceCaptureUsername || undefined,
                signature,
            }),
        });

        const payload = await response.json();
        if (!response.ok) {
            throw new Error(payload?.error || payload?.content || "Face capture failed.");
        }

        setFaceStatus(payload?.content || "");
        appendMessage(payload?.content || "Face capture complete.", "assistant");
        if (payload?.auth) {
            renderAuthState(payload.auth);
        } else {
            await refreshAuthState();
        }
        if (payload?.users) {
            renderAdminUsers(payload.users);
        } else if (authState?.adminAuthenticated && !adminModal.hidden) {
            await loadAdminUsers();
        }
        if (faceCaptureMode === "admin-enroll" && faceCaptureUsername) {
            setAdminStatus(`Face enrolled for ${faceCaptureUsername}.`);
        }
        if (faceCaptureMode === "self-enroll") {
            setAccountStatus("Your enrolled face has been updated.");
        }
        closeFaceModal();
    } catch (error) {
        faceCapturePending = false;
        faceCaptureBtn.disabled = false;
        setFaceModalStatus(error.message || "Face capture failed.");
    }
}

function createAudioChunksCache(chunks) {
    return chunks.map((chunk) => new Uint8Array(chunk));
}

function setSpeakerState(button, state) {

}

function queueAudioChunksForPlayback(chunks, playbackToken, options = {}) {
    if (!chunks || !chunks.length) {
        return;
    }

    for (const chunk of chunks) {
        enqueueAudioChunkForPlayback(chunk, playbackToken, options);
    }
}

function playCachedAudio(chunks) {
    if (!chunks || !chunks.length) {
        return;
    }

    stopSpeechPlayback();
    queueAudioChunksForPlayback(chunks, activeSpeechPlaybackToken, { mode: "element" });
}

function createSpeakerButton() {

    button.type = "button";

    button.setAttribute("aria-label", "Response audio");

    };

    button.addEventListener("touchstart", primeButtonAudio, { passive: true });

    button.addEventListener("click", () => {

        if (!rawChunks || !rawChunks.length) {
            return;
        }
        playCachedAudio(rawChunks);
    });

    return button;
}

function stopSpeechPlayback() {
    activeSpeechPlaybackToken += 1;
    activeSpeechQueue = [];
    activeSpeechPumpPromise = null;
    speechPlaybackTailTime = 0;

    if (activeSpeechAudio) {
        if (typeof activeSpeechAudio.pause === "function") {
            activeSpeechAudio.pause();
            activeSpeechAudio.src = "";
        } else {
            try {
                activeSpeechAudio.stop();
            } catch (error) {
                // ignore nodes already stopped
            }
            try {
                activeSpeechAudio.disconnect();
            } catch (error) {
                // ignore nodes already disconnected
            }
        }
        activeSpeechAudio = null;
    }

    if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
    }
}

function browserSpeak(text) {
    if (!("speechSynthesis" in window)) {
        return;
    }

    const safeText = (text || "").trim();
    if (!safeText) {
        return;
    }

    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(safeText);
    utterance.rate = 1;
    utterance.pitch = 1;
    window.speechSynthesis.speak(utterance);
}

function enqueueAudioChunkForPlayback(wavBytes, playbackToken, options = {}) {
    if (!wavBytes || wavBytes.length === 0 || playbackToken !== activeSpeechPlaybackToken) {
        return;
    }

    const mode = options.mode === "element" ? "element" : "web_audio";
    activeSpeechQueue.push({ wavBytes, mode });

    const pumpQueue = async () => {
        if (
            playbackToken !== activeSpeechPlaybackToken ||
            activeSpeechPumpPromise ||
            activeSpeechQueue.length === 0
        ) {
            return;
        }

        activeSpeechPumpPromise = (async () => {
            while (playbackToken === activeSpeechPlaybackToken && activeSpeechQueue.length > 0) {
                const nextItem = activeSpeechQueue.shift();
                if (!nextItem?.wavBytes || nextItem.wavBytes.length === 0) {
                    continue;
                }

                try {
                    if (nextItem.mode === "element") {
                        const audioBlob = new Blob([nextItem.wavBytes], { type: "audio/wav" });
                        const objectUrl = URL.createObjectURL(audioBlob);
                        const audio = new Audio(objectUrl);
                        audio.preload = "auto";
                        audio.playsInline = true;
                        audio.setAttribute("playsinline", "");
                        activeSpeechAudio = audio;

                        const completion = new Promise((resolve) => {
                            audio.onended = resolve;
                            audio.onerror = resolve;
                        });

                        await audio.play();
                        await completion;
                        URL.revokeObjectURL(objectUrl);
                    } else {
                        await unlockAudioPlayback();
                        if (!speechAudioContext) {
                            break;
                        }

                        const wavCopy = nextItem.wavBytes.slice().buffer;
                        const decodedBuffer = await speechAudioContext.decodeAudioData(wavCopy);
                        if (playbackToken !== activeSpeechPlaybackToken) {
                            break;
                        }

                        const source = speechAudioContext.createBufferSource();
                        source.buffer = decodedBuffer;
                        source.connect(speechAudioContext.destination);
                        activeSpeechAudio = source;

                        const startAt = Math.max(
                            speechAudioContext.currentTime + 0.01,
                            speechPlaybackTailTime || 0,
                        );
                        speechPlaybackTailTime = startAt + decodedBuffer.duration;

                        const completion = new Promise((resolve) => {
                            source.onended = resolve;
                        });

                        source.start(startAt);
                        await completion;
                    }

                    if (activeSpeechAudio) {
                        activeSpeechAudio = null;
                    }
                } catch (error) {
                    if (activeSpeechAudio) {
                        if (typeof activeSpeechAudio.pause === "function") {
                            activeSpeechAudio.pause();
                            activeSpeechAudio.src = "";
                        } else {
                            try {
                                activeSpeechAudio.disconnect();
                            } catch (disconnectError) {
                                // ignore disconnect failures
                            }
                        }
                        activeSpeechAudio = null;
                    }
                    if (nextItem.mode === "web_audio") {
                        speechPlaybackTailTime = speechAudioContext ? speechAudioContext.currentTime : 0;
                    }
                }
            }
        })();

        try {
            await activeSpeechPumpPromise;
        } finally {
            activeSpeechPumpPromise = null;
        }
    };

    pumpQueue().catch(() => {});
}

async function waitForSpeechQueueToDrain(playbackToken, timeoutMs = 15000) {
    const startedAt = Date.now();

    while (playbackToken === activeSpeechPlaybackToken) {
        if (!activeSpeechAudio && activeSpeechQueue.length === 0) {
            return;
        }

        if (Date.now() - startedAt > timeoutMs) {
            return;
        }

        await sleep(50);
    }
}

async function fetchTTSChunks(text) {
    const response = await fetch(`${ROUTES.textToSpeech}?stream=1`, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({ text }),
    });

    if (!response.ok) {
        throw new Error(`TTS request failed with status ${response.status}`);
    }

    const contentType = (response.headers.get("content-type") || "").toLowerCase();
    if (contentType.includes("application/json")) {
        const payload = await response.json();
        if (payload?.fallback === "browser_speak") {
            return null;
        }
        throw new Error(payload?.error || "Unexpected JSON response from streamed TTS endpoint.");
    }

    if (!response.body) {
        throw new Error("Streamed TTS response body is unavailable.");
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    const chunks = [];
    let buffer = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) {
            break;
        }

        buffer += decoder.decode(value, { stream: true });
        let newlineIndex = buffer.indexOf("\n");

        while (newlineIndex >= 0) {
            const line = buffer.slice(0, newlineIndex).trim();
            buffer = buffer.slice(newlineIndex + 1);

            if (line) {
                const msg = JSON.parse(line);
                if (msg.type === "audio_chunk" && msg.audio_b64_wav) {
                    const raw = atob(msg.audio_b64_wav);
                    const bytes = Uint8Array.from(raw, (char) => char.charCodeAt(0));
                    chunks.push(bytes);
                } else if (msg.type === "error") {
                    throw new Error(msg.detail || "Unknown streamed TTS error.");
                }
            }

            newlineIndex = buffer.indexOf("\n");
        }
    }

    return chunks.length ? createAudioChunksCache(chunks) : null;
}

async function warmProcessingSpeechCache() {
    try {
        const [processing, processingComplete] = await Promise.all([
            fetchTTSChunks("processing"),
            fetchTTSChunks("processing complete"),
        ]);

        speechCueCache.processing = processing;
        speechCueCache.processingComplete = processingComplete;
    } catch (error) {
        console.warn("Unable to pre-cache processing speech cues.", error);
    }
}

function queueProcessingCueForPrompt(message) {
    if (countWords(message) <= PROCESSING_WORD_THRESHOLD) {
        pendingProcessingPlaybackToken = null;
        return;
    }

    stopSpeechPlayback();
    pendingProcessingPlaybackToken = activeSpeechPlaybackToken;

    if (speechCueCache.processing?.length) {
        queueAudioChunksForPlayback(speechCueCache.processing, pendingProcessingPlaybackToken);
    } else {
        browserSpeak("processing");
    }
}

async function playProcessingCompletePrelude(playbackToken) {
    if (playbackToken !== activeSpeechPlaybackToken) {
        return;
    }

    if (speechCueCache.processingComplete?.length) {
        queueAudioChunksForPlayback(speechCueCache.processingComplete, playbackToken);
        await waitForSpeechQueueToDrain(playbackToken);
    } else {
        browserSpeak("processing complete");
        await sleep(1200);
    }

    await sleep(2000);
}

async function cacheStreamedTTS(text, speakerButton, shouldAutoplay, useProcessingPrelude) {
    const response = await fetch(`${ROUTES.textToSpeech}?stream=1`, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({ text }),
    });

    const contentType = (response.headers.get("content-type") || "").toLowerCase();
    if (!response.ok) {
        throw new Error(`TTS request failed with status ${response.status}`);
    }

    if (contentType.includes("application/json")) {
        const payload = await response.json();
        if (payload?.fallback === "browser_speak") {
            pendingProcessingPlaybackToken = null;
            setSpeakerState(speakerButton, "error");
            if (shouldAutoplay) {
                browserSpeak(payload?.text || text);
            }
            return;
        }
        throw new Error(payload?.error || "Unexpected JSON response from streamed TTS endpoint.");
    }

    if (!response.body) {
        throw new Error("Streamed TTS response body is unavailable.");
    }

    let playbackToken = activeSpeechPlaybackToken;
    if (shouldAutoplay) {
        if (useProcessingPrelude && pendingProcessingPlaybackToken === activeSpeechPlaybackToken) {
            playbackToken = pendingProcessingPlaybackToken;
        } else {
            stopSpeechPlayback();
            playbackToken = activeSpeechPlaybackToken;
        }
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    const chunks = [];
    let handledFirstChunk = false;
    let buffer = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) {
            break;
        }

        if (shouldAutoplay && playbackToken !== activeSpeechPlaybackToken) {
            return;
        }

        buffer += decoder.decode(value, { stream: true });
        let newlineIndex = buffer.indexOf("\n");

        while (newlineIndex >= 0) {
            const line = buffer.slice(0, newlineIndex).trim();
            buffer = buffer.slice(newlineIndex + 1);

            if (line) {
                const msg = JSON.parse(line);
                if (msg.type === "audio_chunk" && msg.audio_b64_wav) {
                    const raw = atob(msg.audio_b64_wav);
                    const bytes = Uint8Array.from(raw, (char) => char.charCodeAt(0));
                    chunks.push(bytes);

                    if (shouldAutoplay) {
                        if (!handledFirstChunk && useProcessingPrelude) {
                            handledFirstChunk = true;
                            await playProcessingCompletePrelude(playbackToken);
                            if (playbackToken !== activeSpeechPlaybackToken) {
                                return;
                            }
                        }

                        enqueueAudioChunkForPlayback(bytes, playbackToken);
                    }
                } else if (msg.type === "error") {
                    throw new Error(msg.detail || "Unknown streamed TTS error.");
                }
            }

            newlineIndex = buffer.indexOf("\n");
        }
    }

    pendingProcessingPlaybackToken = null;

    if (!chunks.length) {
        throw new Error("No audio chunks were returned by the TTS stream.");
    }

    speakerButton.__audioChunks = createAudioChunksCache(chunks);
    speakerButton.dataset.audioReady = "true";
    setSpeakerState(speakerButton, "ready");
    updateBubblePlaybackTarget(speakerButton.__bubble, speakerButton);
}

async function cacheAssistantAudio(text, speakerButton, useProcessingPrelude, shouldAutoplay = FRONTEND_TTS_AUTOPLAY) {
    const safeText = (text || "").trim();
    if (!safeText) {
        setSpeakerState(speakerButton, "error");
        pendingProcessingPlaybackToken = null;
        return;
    }

    try {
        await cacheStreamedTTS(safeText, speakerButton, shouldAutoplay, useProcessingPrelude);
    } catch (error) {
        console.warn("Unable to cache streamed TTS audio.", error);
        setSpeakerState(speakerButton, "error");
        speakerButton.dataset.audioReady = "false";
        updateBubblePlaybackTarget(speakerButton.__bubble, speakerButton);
        pendingProcessingPlaybackToken = null;
        if (shouldAutoplay) {
            browserSpeak(safeText);
        }
    }
}

function updateInputHeight() {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
    prediction.style.height = input.style.height;

function escapeHtml(value) {
    return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function getPredictionSuffix(value) {
    const trimmed = value.trim();
    if (!trimmed) return "";

    const lowerTrimmed = trimmed.toLowerCase();
    for (let index = questionHistory.length - 1; index >= 0; index--) {
        const candidate = questionHistory[index];
        if (candidate.toLowerCase().startsWith(lowerTrimmed) && candidate.length > trimmed.length) {
            return candidate.slice(trimmed.length);
        }
    }

    return "";
}

function updatePrediction() {
    const typed = input.value;
    const suffix = getPredictionSuffix(typed);
    const typedHtml = `<span class="typed">${escapeHtml(typed)}</span>`;
    const suffixHtml = suffix ? `<span class="suffix">${escapeHtml(suffix)}</span>` : "";
    prediction.innerHTML = `${typedHtml}${suffixHtml}`;
    prediction.scrollTop = input.scrollTop;
}

function setInputValue(value) {
    input.value = value;
    updateInputHeight();
    updatePrediction();
}

function downsampleBuffer(samples, sourceRate, targetRate) {
    if (targetRate >= sourceRate) {
        return samples;
    }

    const ratio = sourceRate / targetRate;
    const outLength = Math.floor(samples.length / ratio);
    const out = new Float32Array(outLength);
    let sourceIndex = 0;

    for (let i = 0; i < outLength; i++) {
        const nextSourceIndex = Math.round((i + 1) * ratio);
        let sum = 0;
        let count = 0;

        while (sourceIndex < nextSourceIndex && sourceIndex < samples.length) {
            sum += samples[sourceIndex];
            sourceIndex += 1;
            count += 1;
        }

        out[i] = count ? (sum / count) : 0;
    }

    return out;
}

function encodePcmToWav(samples, sampleRate) {
    const pcmData = new Int16Array(samples.length);
    for (let i = 0; i < samples.length; i++) {
        const s = Math.max(-1, Math.min(1, samples[i] || 0));
        pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }

    const wavBuffer = new ArrayBuffer(44 + pcmData.length * 2);
    const view = new DataView(wavBuffer);
    const writeString = (offset, value) => {
        for (let i = 0; i < value.length; i++) {
            view.setUint8(offset + i, value.charCodeAt(i));
        }
    };

    writeString(0, "RIFF");
    view.setUint32(4, 36 + pcmData.length * 2, true);
    writeString(8, "WAVE");
    writeString(12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(36, "data");
    view.setUint32(40, pcmData.length * 2, true);

    let offset = 44;
    for (let i = 0; i < pcmData.length; i++, offset += 2) {
        view.setInt16(offset, pcmData[i], true);
    }

    return new Blob([view], { type: "audio/wav" });
}

function buildWavBlobFromPcmChunks() {
    if (!micPcmChunks.length) {
        return null;
    }

    const totalLength = micPcmChunks.reduce((acc, chunk) => acc + chunk.length, 0);
    const merged = new Float32Array(totalLength);
    let offset = 0;
    for (const chunk of micPcmChunks) {
        merged.set(chunk, offset);
        offset += chunk.length;
    }

    const downsampled = downsampleBuffer(merged, micSampleRate, 16000);
    return encodePcmToWav(downsampled, 16000);
}

async function submitRecordedSpeech(speechBlob, { filename = "speech.wav", autoSubmit = false } = {}) {
    if (!speechBlob || !speechBlob.size) {
        if (autoSubmit) {
            setMicStatus("No speech detected.");
        }
        return;
    }

    const formData = new FormData();
    formData.append("audio", speechBlob, filename);

    isMicSubmitting = true;
    micBtn.disabled = true;
    const originalLabel = micBtn.textContent;
    micBtn.textContent = "…";
    updateMicButtonUi();
    setMicStatus("Transcribing…");

    try {
        const response = await fetch(ROUTES.speechToText, {
            method: "POST",
            credentials: "include",
            body: formData,
        });

        const payload = await response.json();
        if (!response.ok) {
            throw new Error(payload?.error || "Speech-to-text failed.");
        }

        const transcript = String(payload?.text || "").trim();
        if (!transcript) {
            setMicStatus("No speech detected.");
            return;
        }

        setMicStatus(`Captured: “${transcript}”`);
        if (autoSubmit) {
            appendMessage(transcript, "user");

            if (!questionHistory.length || questionHistory[questionHistory.length - 1] !== transcript) {
                questionHistory.push(transcript);
            }

            historyCursor = -1;
            setInputValue("");

            const shouldSpeakReply = FRONTEND_TTS_AUTOPLAY;
            const useProcessingPrelude = shouldSpeakReply && countWords(transcript) > PROCESSING_WORD_THRESHOLD;
            if (shouldSpeakReply) {
                queueProcessingCueForPrompt(transcript);
            }
            streamResponse(transcript, shouldSpeakReply, useProcessingPrelude);
            return;
        }

        const existing = input.value.trim();
        const nextPrompt = existing ? `${existing} ${transcript}` : transcript;
        setInputValue(nextPrompt);
        input.focus();
    } catch (error) {
        console.error("Unable to transcribe microphone input", error);
        appendMessage(`Microphone error: ${error.message || "Unable to transcribe audio."}`, "assistant");
        setMicStatus("Microphone transcription failed.");
    } finally {
        isMicSubmitting = false;
        micBtn.textContent = originalLabel;
        micBtn.disabled = false;
        updateMicButtonUi();
    }
}

async function startMicrophone() {
    if (!navigator.mediaDevices?.getUserMedia) {
        appendMessage("Microphone is not supported in this browser.", "assistant");
        return;
    }

    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micPcmChunks = [];
        micRecordingToken += 1;
        micSpeechDetected = false;
        clearMicSilenceTimeout();
        micAudioContext = new (window.AudioContext || window.webkitAudioContext)();
        micSampleRate = micAudioContext.sampleRate;
        micSourceNode = micAudioContext.createMediaStreamSource(micStream);
        micProcessorNode = micAudioContext.createScriptProcessor(4096, 1, 1);
        setMicStatus("Listening… start speaking.");

        micProcessorNode.onaudioprocess = (event) => {
            if (!isMicRecording) {
                return;
            }
            const channelData = event.inputBuffer.getChannelData(0);
            micPcmChunks.push(new Float32Array(channelData));

            let sumSquares = 0;
            for (let index = 0; index < channelData.length; index++) {
                const sample = channelData[index];
                sumSquares += sample * sample;
            }

            const rms = Math.sqrt(sumSquares / channelData.length);
            if (rms >= MIC_SPEECH_THRESHOLD) {
                micSpeechDetected = true;
                clearMicSilenceTimeout();
                setMicStatus("Listening…");
                return;
            }

            if (micSpeechDetected && !micSilenceTimeoutId) {
                setMicStatus("Speech captured. Waiting 2 seconds for more…");
                scheduleMicAutoStop(micRecordingToken);
            }
        };

        micSourceNode.connect(micProcessorNode);
        micProcessorNode.connect(micAudioContext.destination);

        isMicRecording = true;
        updateMicButtonUi();
    } catch (error) {
        cleanupMicrophone();
        appendMessage("Unable to access microphone. Please allow microphone permission.", "assistant");
    }
}

function stopMicrophone({ autoSubmit = true } = {}) {
    if (!isMicRecording) {
        cleanupMicrophone();
        return;
    }

    const wavBlob = buildWavBlobFromPcmChunks();
    cleanupMicrophone();
    submitRecordedSpeech(wavBlob, { filename: "speech.wav", autoSubmit });
}

function moveHistory(direction) {
    if (!questionHistory.length) return;

    if (historyCursor === -1) {
        historyCursor = questionHistory.length;
    }

    historyCursor = Math.max(0, Math.min(questionHistory.length, historyCursor + direction));

    if (historyCursor === questionHistory.length) {
        setInputValue("");
        return;
    }

    setInputValue(questionHistory[historyCursor]);
}

async function loadQuestionHistory() {
    try {
        const response = await fetch(ROUTES.questionHistory, { credentials: "include" });
        if (!response.ok) return;

        const payload = await response.json();
        if (Array.isArray(payload.history)) {
            questionHistory = payload.history;
        }
    } catch (error) {
        console.warn("Unable to load question history", error);
    }
}

input.addEventListener("keydown", (event) => {
    if (event.key === "Tab") {
        const suffix = getPredictionSuffix(input.value);
        if (!suffix) return;

        event.preventDefault();
        setInputValue(input.value + suffix);
        return;
    }

    if (event.key === "ArrowUp" && input.selectionStart === 0 && input.selectionEnd === 0) {
        event.preventDefault();
        moveHistory(-1);
        return;
    }

    if (event.key === "ArrowDown" && input.selectionStart === input.value.length && input.selectionEnd === input.value.length) {
        event.preventDefault();
        moveHistory(1);
        return;
    }

    if (event.key !== "Enter") {
        return;
    }

    if (!event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
    }
});

async function uploadSelectedFile() {
    const file = fileInput.files?.[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);

    uploadBtn.disabled = true;
    uploadBtn.textContent = "Uploading...";

    try {
        const response = await fetch(ROUTES.upload, {
            method: "POST",
            credentials: "include",
            body: formData,
        });

        const contentType = response.headers.get("content-type") || "";
        const isJson = contentType.includes("application/json");
        const payload = isJson ? await response.json() : null;
        if (!response.ok) {
            const fallbackError = isJson
                ? (payload?.error || "Upload failed.")
                : `Upload failed with status ${response.status}.`;
            throw new Error(fallbackError);
        }

        appendMessage(payload?.message || "Upload complete.", "assistant");
        fileInput.value = "";
    } catch (error) {
        appendMessage(`Upload error: ${error.message}`, "assistant");
    } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload file";
    }
}

/* ---------------- Message Trim ---------------- */

function trimMessages() {
    const messages = Array.from(output.querySelectorAll(":scope > .message"));
    while (messages.length > MAX_MESSAGES) {
        const oldest = messages.shift();
        if (oldest) {
            output.removeChild(oldest);
        }
    }
}

/* ---------------- Append Message ---------------- */

function appendMessage(content, role) {
    const msg = document.createElement("div");
    msg.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    msg.appendChild(bubble);
    output.appendChild(msg);
    output.appendChild(frameThinkingLayer);
    msg.scrollIntoView({ block: "start", behavior: "smooth" });

    trimMessages();
    safeScroll();
}

/* ---------------- Form Submit ---------------- */

form.addEventListener("submit", async function(e) {
    e.preventDefault();
    unlockAudioPlayback().catch(() => {});

    const authenticated = await ensureAuthenticatedSession();
    if (!authenticated) {
        return;
    }

    const message = input.value.trim();
    if (!message) return;

    setMobileActionsOpen(false);

    appendMessage(message, "user");

    if (!questionHistory.length || questionHistory[questionHistory.length - 1] !== message) {
        questionHistory.push(message);
    }

    historyCursor = -1;
    setInputValue("");

    const shouldSpeakReply = FRONTEND_TTS_AUTOPLAY;
    const useProcessingPrelude = shouldSpeakReply && countWords(message) > PROCESSING_WORD_THRESHOLD;
    if (shouldSpeakReply) {
        queueProcessingCueForPrompt(message);
    }
    streamResponse(message, shouldSpeakReply, useProcessingPrelude);
});

/* ---------------- Streaming ---------------- */

function streamResponse(message, shouldSpeakReply = false, useProcessingPrelude = false) {
    frameThinkingLayer.textContent = "";
    frameThinkingLayer.style.top = "0px";
    output.scrollTop = 0;
    thinkingFocusMode = false;
    output.classList.remove("thinking-focus-mode");
    footerStatusNote = "";
    refreshFooterStatus();

    const msg = document.createElement("div");
    msg.className = "message assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    const speakerButton = createSpeakerButton();
    speakerButton.__bubble = bubble;

    const primeBubblePlayback = () => {
        if (!shouldUseIPhoneBubblePlaybackTarget()) {
            return;
        }
        unlockAudioPlayback().catch(() => {});
    };

    bubble.addEventListener("pointerdown", primeBubblePlayback, { passive: true });
    bubble.addEventListener("touchstart", primeBubblePlayback, { passive: true });
    bubble.addEventListener("click", (event) => {
        if (!shouldUseIPhoneBubblePlaybackTarget() || isInteractiveBubbleTarget(event.target)) {
            return;
        }

        const rawChunks = speakerButton.__audioChunks;
        if (!rawChunks || !rawChunks.length) {
            return;
        }

        playCachedAudio(rawChunks);
    });
    bubble.addEventListener("dblclick", (event) => {
        if (isInteractiveBubbleTarget(event.target)) {
            return;
        }
        toggleThinkingFocusMode();
    });

    // Typing indicator
    bubble.innerHTML = `
        <span class="typing">
            <span></span><span></span><span></span>
        </span>
    `;

    msg.appendChild(bubble);
    output.appendChild(msg);
    output.appendChild(frameThinkingLayer);

    trimMessages();
    safeScroll();

    input.disabled = true;
    stopBtn.disabled = false;
    isStreaming = true;
    setAvatarState("thinking");

    const abortController = new AbortController();
    currentStream = abortController;

    let textNode = null;
    let cursorEl = null;
    let started = false;
    let visibleAssistantText = "";
    let streamedThinkingText = "";

    const syncThinkingLayerTop = () => {
        frameThinkingLayer.style.top = `${msg.offsetTop}px`;
    };
    requestAnimationFrame(syncThinkingLayerTop);

    const resetUi = () => {
        input.disabled = false;
        input.focus();
        stopBtn.disabled = true;
        currentStream = null;
        isStreaming = false;
    };

    const parseServerError = (rawText, status) => {
        const body = String(rawText || "").trim();
        if (!body) {
            return `Request failed with status ${status}`;
        }

        const dataLines = body
            .split("\n")
            .filter((entry) => entry.startsWith("data:"));

        if (dataLines.length) {
            try {
                const payload = dataLines
                    .map((line) => line.slice(5).trim())
                    .join("\n");
                const parsed = JSON.parse(payload);
                if (parsed?.error) {
                    return parsed.error;
                }
            } catch (error) {
                console.warn("Unable to parse SSE error payload.", error);
            }
        }

        return body;
    };

    const handleEvent = (data) => {

        if (data.type === "token") {

            if (!started) {
                bubble.innerHTML = "";

                textNode = document.createTextNode("");
                bubble.appendChild(textNode);

                cursorEl = document.createElement("span");
                cursorEl.className = "cursor";
                bubble.appendChild(cursorEl);

                started = true;
            }

            visibleAssistantText += data.content;
            textNode.nodeValue = visibleAssistantText;
            safeScroll();
        }

        if (data.type === "thinking" && data.content) {
            streamedThinkingText += data.content;
            frameThinkingLayer.textContent = streamedThinkingText;
            syncThinkingLayerTop();
        }

        if (data.type === "done") {
            if (!started) {
                bubble.innerHTML = "";
                setAvatarState("smiling");
                resetUi();
                return;
            }

            if (cursorEl) cursorEl.remove();

            const assistantText = visibleAssistantText;

            // Render markdown once
            const parsedHtml = marked.parse(assistantText);
            const sanitizedHtml = DOMPurify.sanitize(parsedHtml, SANITIZE_CONFIG);
            bubble.innerHTML = sanitizedHtml;
            bubble.appendChild(speakerButton);

            input.disabled = false;
            input.focus();
            stopBtn.disabled = true;
            setAvatarState("smiling");

            cacheAssistantAudio(assistantText, speakerButton, useProcessingPrelude, shouldSpeakReply);
            resetUi();
        }

        if (data.type === "error") {
            bubble.textContent = "Error: " + data.error;
            setAvatarState(input.value.length ? "waiting" : "smiling");
            resetUi();
        }
    };

    fetch(ROUTES.stream, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({ message }),
        signal: abortController.signal,
    })
        .then(async (response) => {
            if (!response.ok) {
                const rawBody = await response.text();
                throw new Error(parseServerError(rawBody, response.status));
            }

            if (!response.body) {
                throw new Error("No response stream available.");
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split("\n\n");
                buffer = events.pop() || "";

                for (const rawEvent of events) {
                    const dataLines = rawEvent
                        .split("\n")
                        .filter((entry) => entry.startsWith("data:"));

                    if (!dataLines.length) continue;

                    try {
                        const payload = dataLines
                            .map((line) => line.slice(5).trim())
                            .join("\n");
                        const data = JSON.parse(payload);
                        handleEvent(data);
                    } catch {
                        handleEvent({
                            type: "error",
                            error: "Malformed server event.",
                        });
                    }
                }
            }

            if (currentStream === abortController) {
                setAvatarState(input.value.length ? "waiting" : "smiling");
                resetUi();
            }
        })
        .catch((error) => {
            if (error.name === "AbortError") {
                bubble.textContent = "Request stopped.";
                setAvatarState(input.value.length ? "waiting" : "smiling");
                resetUi();
                return;
            }

            handleEvent({
                type: "error",
                error: error.message || "Unable to stream response.",
            });
        });
}
